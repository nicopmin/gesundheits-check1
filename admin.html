<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Vitalitäts-Check Verwaltung</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main class="admin-page">
    <section class="admin-card">
        <div class="admin-header">
            <div>
                <h1>Vitalitäts-Check Verwaltung</h1>
                <p>Verwalte Anfragen, Termine, PDFs und Kundenstatus.</p>
            </div>
        </div>
<div class="stats-grid">

    <div class="stat-card">
        <span class="stat-label">🔵 Neu</span>
        <h2 id="stat-neu">0</h2>
    </div>

    <div class="stat-card">
        <span class="stat-label">🟠 Beratung erfolgt</span>
        <h2 id="stat-beratung">0</h2>
    </div>

    <div class="stat-card">
        <span class="stat-label">🟢 Kunde geworden</span>
        <h2 id="stat-kunde">0</h2>
    </div>

    <div class="stat-card">
        <span class="stat-label">🔴 Kein Interesse</span>
        <h2 id="stat-kein">0</h2>
    </div>

</div>
        <div class="admin-toolbar">

    <input
        type="text"
        id="suche"
        placeholder="Nach Name oder E-Mail suchen..."
    >

    <select id="statusFilter">
        <option value="Alle">Alle Status</option>
        <option value="Neu">Neu</option>
        <option value="Beratung erfolgt">Beratung erfolgt</option>
        <option value="Kunde geworden">Kunde geworden</option>
        <option value="Kein Interesse">Kein Interesse</option>
    </select>
<button id="filterReset">
        Zurücksetzen
    </button>
</div>

<div class="table-info">
    <span id="tableInfo">0 Datensätze</span>
</div>

        <div class="admin-table-wrapper">
            <table id="checksTable">
                <thead>
                    <tr>
                        <th></th>
                        <th id="datumHeader" style="cursor: pointer;">
    Datum ▼
</th>
                        <th>Name</th>
                        <th>E-Mail</th>
                        <th>Termin</th>
                        <th>PDF</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody>
                </tbody>
            </table>
        </div>
    </section>
</main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/admin.js?v=2"></script>
</body>
</html>
